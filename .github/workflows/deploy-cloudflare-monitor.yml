name: Deploy Cloudflare upstream monitor

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MONITOR_GITHUB_TOKEN: ${{ secrets.MONITOR_GITHUB_TOKEN }}
      MONITOR_TOKEN: ${{ secrets.MONITOR_TOKEN }}
      MONITOR_WORKER_NAME: ${{ vars.MONITOR_WORKER_NAME || 'edgetunnel-upstream-monitor' }}
      MONITOR_KV_TITLE: ${{ vars.MONITOR_KV_TITLE || 'edgetunnel-monitor-kv' }}
      TARGET_OWNER: ${{ github.repository_owner }}
      TARGET_REPO: ${{ github.event.repository.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID MONITOR_GITHUB_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required secret: $name"
              exit 1
            fi
          done

      - name: Create or reuse monitor KV namespace
        id: kv
        run: |
          set -euo pipefail

          api() {
            curl -fsS \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "$@"
          }

          list_json="$(api "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces?per_page=100")"
          namespace_id="$(node -e '
            const data = JSON.parse(process.argv[1]);
            const title = process.argv[2];
            const item = (data.result || []).find((namespace) => namespace.title === title);
            process.stdout.write(item?.id || "");
          ' "$list_json" "$MONITOR_KV_TITLE")"

          if [ -z "$namespace_id" ]; then
            create_json="$(api -X POST \
              --data "{\"title\":\"${MONITOR_KV_TITLE}\"}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces")"
            namespace_id="$(node -e '
              const data = JSON.parse(process.argv[1]);
              process.stdout.write(data.result?.id || "");
            ' "$create_json")"
          fi

          if [ -z "$namespace_id" ]; then
            echo "::error::Could not create or locate monitor KV namespace"
            exit 1
          fi

          echo "namespace_id=$namespace_id" >> "$GITHUB_OUTPUT"

      - name: Write monitor deploy config
        run: |
          set -euo pipefail
          cat > cloudflare-monitor/wrangler.deploy.toml <<EOF
          name = "${MONITOR_WORKER_NAME}"
          main = "src/index.js"
          compatibility_date = "2025-11-04"

          [vars]
          UPSTREAM_OWNER = "cmliu"
          UPSTREAM_REPO = "edgetunnel"
          TARGET_OWNER = "${TARGET_OWNER}"
          TARGET_REPO = "${TARGET_REPO}"
          BRANCH = "main"
          DISPATCH_EVENT_TYPE = "upstream-update"

          [triggers]
          crons = ["*/30 * * * *"]

          [[kv_namespaces]]
          binding = "SYNC_STATE"
          id = "${{ steps.kv.outputs.namespace_id }}"
          EOF

      - name: Deploy monitor Worker
        working-directory: cloudflare-monitor
        run: npx wrangler@4 deploy --config wrangler.deploy.toml

      - name: Put monitor secrets
        working-directory: cloudflare-monitor
        run: |
          set -euo pipefail
          printf '%s' "$MONITOR_GITHUB_TOKEN" | npx wrangler@4 secret put GITHUB_TOKEN --config wrangler.deploy.toml
          if [ -n "${MONITOR_TOKEN:-}" ]; then
            printf '%s' "$MONITOR_TOKEN" | npx wrangler@4 secret put MONITOR_TOKEN --config wrangler.deploy.toml
          fi
